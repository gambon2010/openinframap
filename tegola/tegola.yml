webserver:
  port: :80
  headers:
    Access-Control-Allow-Origin: "*"
    Access-Control-Allow-Methods: "GET, OPTIONS"
    Access-Control-Allow-Headers: "Origin, X-Requested-With, Content-Type, Accept"

cache: 
  type: file
  basepath: /tmp/tegola
  max_zoom: 13

providers:
  - name: postgis
    type: mvt_postgis
    uri: "${DB_URI}"
    srid: 3857
    max_connections: 20
